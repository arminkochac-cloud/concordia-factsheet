<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Concordia Celes Hotel - Digital Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #1b2a33 0%, #111a20 100%); color: #ffffff; min-height: 100vh; display: flex; justify-content: center; padding: 30px 15px; position: relative; overflow-x: hidden; }
        
        .bg-shape { position: absolute; width: 150px; height: 150px; background: rgba(255,255,255,0.02); transform: rotate(45deg); border-radius: 20px; z-index: -1; }
        .shape1 { top: 10%; left: -50px; } .shape2 { bottom: 20%; right: -50px; }
        
        .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; z-index: 1; }
        
        .main-card { background: #243642; border: 1.5px solid #d1a751; border-radius: 12px; width: 100%; padding: 25px 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .main-card .hotel-icon { font-size: 36px; color: #ff6b6b; margin-bottom: 12px; }
        .main-card h1 { font-size: 19px; font-weight: 800; margin-bottom: 5px; letter-spacing: 0.5px; }
        .main-card h2 { font-size: 10px; color: #d1a751; letter-spacing: 1.5px; margin-bottom: 8px; text-transform: uppercase; }
        .main-card p { font-size: 9px; color: #9baab3; }
        
        .lang-title { font-size: 11px; color: #e0e0e0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .lang-title i { color: #4ba3e3; font-size: 14px;}
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 12px; }
        .lang-btn { background: #243642; border-radius: 10px; padding: 16px; text-align: left; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.15); border: 1px solid transparent; user-select: none; }
        .lang-btn:active { transform: scale(0.96); }
        .lang-btn h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: #ffffff;}
        .lang-btn p { font-size: 12px; font-weight: 600; color: #d1a751; margin-bottom: 2px;}
        .lang-btn span { font-size: 8px; color: #9baab3; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 10px; }
        .action-btn { background: #243642; border-radius: 10px; padding: 15px 5px; text-align: center; }
        .action-btn i { font-size: 20px; margin-bottom: 8px; }
        .action-btn h4 { font-size: 10px; font-weight: 600; margin-bottom: 4px; color: #d1a751;}
        .action-btn p { font-size: 7px; color: #9baab3; line-height: 1.3;}
        .action-btn.full-width { grid-column: span 3; cursor: pointer; padding: 15px;}
        .action-btn.full-width:active { transform: scale(0.98); }
        .ic-wifi { color: #4ba3e3; } .ic-phone { color: #ff6b6b; } .ic-mail { color: #e0e0e0; } .ic-web { color: #4ba3e3; }
        
        .footer { margin-top: 30px; text-align: center; }
        .stars { color: #d1a751; font-size: 10px; margin-bottom: 8px; letter-spacing: 2px;}
        .footer p { font-size: 8px; color: #748894; margin-bottom: 4px; }

        /* MODAL (AÇILIR PENCERE) CSS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: flex-end; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: #ffffff; color: #222; width: 100%; max-width: 500px; height: 85vh; border-radius: 20px 20px 0 0; padding: 25px 20px; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); position: relative; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .close-btn { position: sticky; top: 0; right: 0; float: right; background: #f0f0f0; width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 18px; color: #333; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .modal-body h2 { font-size: 22px; color: #1b2a33; margin-bottom: 15px; font-weight: 800;}
        .wifi-alert { background: #e3f2fd; color: #0277bd; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-bottom: 20px;}
        .modal-body h3 { font-size: 13px; color: #d1a751; border-bottom: 2px solid #f0f0f0; padding-bottom: 5px; margin: 20px 0 10px 0; font-weight: 700;}
        .modal-body p { font-size: 13px; line-height: 1.6; margin-bottom: 10px; color: #444;}
        .modal-body ul { list-style: none; margin-bottom: 15px; }
        .modal-body ul li { font-size: 13px; padding: 8px 12px; background: #f8f9fa; margin-bottom: 6px; border-radius: 6px; border-left: 4px solid #d1a751; display: flex; justify-content: space-between; align-items: center; color: #444; }
        .modal-body ul li strong { color: #1b2a33; font-weight: 600;}
